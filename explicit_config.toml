[general]
library_path = ""  # Set to your music library root

[emby]
url = "http://localhost:8096"
# API key goes in .env file as EMBY_API_KEY

[detection.r]
stems = ["fuck", "shit", "nigga", "nigger", "pussy", "cock", "cum", "faggot"]
exact = ["blowjob", "cocksucker", "motherfuck", "bullshit"]

[detection.pg13]
stems = ["bitch", "whore", "slut"]
exact = ["hoe", "asshole", "piss"]

[detection.ignore]
false_positives = [
    "cockatoo",
    "cockatiel",
    "cocktail",
    "hancock",
    "dickens",
    "dickson",
    "scunthorpe",
    "pissarro",
    "circumstance",
    "circumstan",
    "cucumber",
    "cumulative",
    "cumbersome",
    "cumberbatch",
    "document",
    "incumbent",
    "succumb",
    "accumulate",
]

[report]
output_path = "explicit_report.csv"
